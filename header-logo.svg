<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 88" width="320" height="88" role="img" aria-labelledby="title desc">
  <title id="title">CJF Hal AI</title>
  <desc id="desc">Futuristic brand mark with cyan glow and geometric arc</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="45%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="320" height="88" rx="14" fill="url(#bg)"/>
  <path d="M 24 58 C 38 56 48 48 58 34 S 78 18 92 14 112 8 128 10" fill="none" stroke="url(#arc)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <text x="148" y="54" fill="#ecfeff" font-family="Segoe UI, system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="0.04em">CJF Hal AI</text>
</svg>
